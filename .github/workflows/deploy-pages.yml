name: Deploy Angular app to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: npm run build

      - name: Prepare SPA fallback
        run: |
          if [ -f dist/MyFirstMillion/browser/index.csr.html ]; then
            cp dist/MyFirstMillion/browser/index.csr.html dist/MyFirstMillion/browser/404.html
          elif [ -f dist/MyFirstMillion/browser/index.html ]; then
            cp dist/MyFirstMillion/browser/index.html dist/MyFirstMillion/browser/404.html
          else
            echo "No Angular index file found in dist/MyFirstMillion/browser" >&2
            exit 1
          fi
          touch dist/MyFirstMillion/browser/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist/MyFirstMillion/browser
          publish_branch: gh-pages
          force_orphan: true
