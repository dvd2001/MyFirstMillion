<div id="navbar">
    <button id="backBtn" (click)="onBack()">〈 Back</button>
</div>
<section id="stocks">
    <div class="title">
        <h1>Részvények</h1>
    </div>
    <div class="container">
        <div id="gold" class="stock cards">
            <img class="icon" src="assets/images/gold.png" alt="Gold Bars">
            <div class="text">
                <h2>Arany</h2>
                <div class="detail">
                    <p class="title">Vételár:</p>
                    <p id="goldPrice" class="price"></p>
                </div>
                <div class="detail">
                    <p class="title">Mennyiség:</p>
                    <p id="goldAmount" class="price"></p>
                </div>
            </div>
            <button class="infoBtn" (click)="goldInfo()">
                <img [src]="themeService.getTheme()() === 'light' ? 'assets/images/info.png' : 'assets/images/infoWhite.png'"
                    alt="Information" class="info">
            </button>
        </div>
        <div id="mine" class="stock cards">
            <img src="assets/images/mine.png" alt="Mine" class="icon">
            <div class="text">
                <h2>Bánya</h2>
                <div class="detail">
                    <p class="title">Vételár:</p>
                    <p id="minePrice" class="price"></p>
                </div>
                <div class="detail">
                    <p class="title">Mennyiség:</p>
                    <p id="mineAmount" class="price"></p>
                </div>
            </div>
            <button class="infoBtn" (click)="mineInfo()">
                <img [src]="themeService.getTheme()() === 'light' ? 'assets/images/info.png' : 'assets/images/infoWhite.png'"
                    alt="Information" class="info">
            </button>
        </div>
        <div id="chocolate" class="stock cards">
            <img src="assets/images/chocolate.png" alt="Chocolate" class="icon">
            <div class="text">
                <h2>Csoki</h2>
                <div class="detail">
                    <p class="title">Vételár:</p>
                    <p id="chocolatePrice" class="price"></p>
                </div>
                <div class="detail">
                    <p class="title">Mennyiség:</p>
                    <p id="chocolateAmount" class="price"></p>
                </div>
            </div>
            <button class="infoBtn" (click)="chocolateInfo()">
                <img [src]="themeService.getTheme()() === 'light' ? 'assets/images/info.png' : 'assets/images/infoWhite.png'"
                    alt="Information" class="info">
            </button>
        </div>
    </div>
</section>
<section id="accomodations">
    <div class="title">
        <h1>Bérlakás/Panzió</h1>
    </div>
    <div class="container">
        <div class="listContainer acList mobileList">
            <div id="flat" class="accomodation cards">
                <img src="assets/images/building.png" alt="Building" class="icon">
                <div class="text">
                    <h2>Bérlakás</h2>
                    <div class="detail">
                        <p class="title">Vételár:</p>
                        <p id="flatPrice" class="price"></p>
                    </div>
                </div>
                <button class="infoBtn" (click)="flatInfo()">
                    <img [src]="themeService.getTheme()() === 'light' ? 'assets/images/info.png' : 'assets/images/infoWhite.png'"
                        alt="Information" class="info">
                </button>
            </div>
            <div *ngIf="showFlat" id="flatList" class="lists"></div>
        </div>
        <div class="listContainer acList mobileList">
            <div id="pansion" class="accomodation cards">
                <img src="assets/images/pansion.png" alt="Guest house" class="icon">
                <div class="text">
                    <h2>Panzió</h2>
                    <div class="detail">
                        <p class="title">Vételár:</p>
                        <p id="pansionPrice" class="price"></p>
                    </div>
                </div>
                <button class="infoBtn" (click)="pansionInfo()">
                    <img [src]="themeService.getTheme()() === 'light' ? 'assets/images/info.png' : 'assets/images/infoWhite.png'"
                        alt="Information" class="info">
                </button>
            </div>
            <div *ngIf="showPansion" id="pansionList" class="lists"></div>
        </div>
    </div>
</section>
<section id="online">
    <div class="title">
        <h1>Online Üzlet</h1>
    </div>
    <div id="onlineContainer" class="container lists">
        <div class="online cards" id="basicOnline">
            <img src="assets/images/online.png" alt="Online Shop" class="icon">
            <div class="text">
                <h2>Alapítás</h2>
                <div class="detail">
                    <p class="title">Vételár:</p>
                    <p id="onlinePrice" class="price"></p>
                </div>
            </div>
            <button class="infoBtn" (click)="onlineInfo()">
                <img [src]="themeService.getTheme()() === 'light' ? 'assets/images/info.png' : 'assets/images/infoWhite.png'"
                    alt="Information" class="info">
            </button>
        </div>
        <div id="levels" class="container">
            <div class="listContainer onlineList mobileList">
                <div class="online cards" id="level1">
                    <div class="text">
                        <h2 class="level">1. szint</h2>
                    </div>
                    <button class="infoBtn" (click)="level1Info()">
                        <img [src]="themeService.getTheme()() === 'light' ? 'assets/images/info.png' : 'assets/images/infoWhite.png'"
                            alt="Information" class="info">
                    </button>
                </div>
                <div *ngIf="showLevel1" id="level1List" class="lists bgOnlineList"></div>
            </div>
            <div class="listContainer onlineList mobileList">
                <div class="online cards" id="level2">
                    <div class="text">
                        <h2 class="level">2. szint</h2>
                    </div>
                    <button class="infoBtn" (click)="level2Info()">
                        <img [src]="themeService.getTheme()() === 'light' ? 'assets/images/info.png' : 'assets/images/infoWhite.png'"
                            alt="Information" class="info">
                    </button>
                </div>
                <div *ngIf="showLevel2" id="level2List" class="lists bgOnlineList"></div>
            </div>
            <div class="listContainer onlineList mobileList">
                <div class="online cards" id="level3">
                    <div class="text">
                        <h2 class="level">3. szint</h2>
                    </div>
                    <button class="infoBtn" (click)="level3Info()">
                        <img [src]="themeService.getTheme()() === 'light' ? 'assets/images/info.png' : 'assets/images/infoWhite.png'"
                            alt="Information" class="info">
                    </button>
                </div>
                <div *ngIf="showLevel3" id="level3List" class="lists bgOnlineList"></div>
            </div>
            <div class="listContainer onlineList mobileList">
                <div class="online cards" id="level4">
                    <div class="text">
                        <h2 class="level">4. szint</h2>
                    </div>
                    <button class="infoBtn" (click)="level4Info()">
                        <img [src]="themeService.getTheme()() === 'light' ? 'assets/images/info.png' : 'assets/images/infoWhite.png'"
                            alt="Information" class="info">
                    </button>
                </div>
                <div *ngIf="showLevel4" id="level4List" class="lists bgOnlineList"></div>
            </div>
            <div class="listContainer onlineList mobileList">
                <div class="online cards" id="level5">
                    <div class="text">
                        <h2 class="level">5. szint</h2>
                    </div>
                    <button class="infoBtn" (click)="level5Info()">
                        <img [src]="themeService.getTheme()() === 'light' ? 'assets/images/info.png' : 'assets/images/infoWhite.png'"
                            alt="Information" class="info">
                    </button>
                </div>
                <div *ngIf="showLevel5" id="level5List" class="lists bgOnlineList"></div>
            </div>
        </div>
    </div>
</section>
